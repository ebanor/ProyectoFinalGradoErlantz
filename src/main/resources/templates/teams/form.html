<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Crear Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
	<link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-dark text-white">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4" style="max-width:500px">

    <div class="mb-3">
        <a href="/teams" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="card bg-secondary p-4">
        <h4 class="text-warning mb-3"><i class="bi bi-shield-plus"></i> Crear equipo</h4>
        <form th:action="@{/teams/new}" method="post">
            <div class="mb-3">
                <label class="form-label">Nombre del equipo</label>
                <input type="text" name="name" class="form-control" required maxlength="50" placeholder="Mi Equipo..."/>
            </div>
            <button class="btn btn-warning w-100">
                <i class="bi bi-check-lg"></i> Crear equipo
            </button>
        </form>
    </div>
</div>

</body>
</html>
