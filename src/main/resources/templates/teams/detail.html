<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-white">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4">

    <div class="mb-3">
        <a href="/teams" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <div class="card bg-secondary p-4">
        <h2 class="text-warning"><i class="bi bi-shield-fill"></i> <span th:text="${team.name}"></span></h2>
        <p><i class="bi bi-person-fill text-warning"></i> <strong>Capitán:</strong>
            <span th:text="${team.captain.username}"></span></p>
        <p><i class="bi bi-people-fill text-warning"></i> <strong>Miembros confirmados:</strong>
            <span th:text="${confirmedMembers.size()}"></span></p>

        <!-- Acciones del capitán -->
        <div th:if="${isCaptain}" class="mt-3 p-3 rounded bg-dark">
            <h6 class="text-warning"><i class="bi bi-person-plus-fill"></i> Invitar amigo al equipo</h6>
            <div th:if="${friends == null or friends.empty}" class="text-muted small">
                No tienes amigos para invitar. <a href="/friends" class="text-warning">Añadir amigos</a>
            </div>
            <form th:if="${friends != null and !friends.empty}"
                  th:action="@{/teams/{id}/invite(id=${team.id})}" method="post"
                  class="d-flex gap-2 mt-2">
                <select name="username" class="form-select form-select-sm" required>
                    <option value="">-- Selecciona un amigo --</option>
                    <option th:each="f : ${friends}"
                            th:value="${f.username}"
                            th:text="${f.username}">
                    </option>
                </select>
                <button class="btn btn-success btn-sm"><i class="bi bi-send"></i> Invitar</button>
            </form>

            <hr class="border-secondary mt-3"/>
            <form th:action="@{/teams/{id}/dissolve(id=${team.id})}" method="post"
                  onsubmit="return confirm('¿Seguro que quieres disolver el equipo?')">
                <button class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-trash"></i> Disolver equipo
                </button>
            </form>
        </div>

        <!-- Abandonar (no capitán) -->
        <div th:if="${isMember and !isCaptain}" class="mt-3">
            <form th:action="@{/teams/{id}/leave(id=${team.id})}" method="post">
                <button class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Abandonar equipo
                </button>
            </form>
        </div>

        <!-- Lista de miembros confirmados -->
        <div class="mt-4">
            <h5><i class="bi bi-people-fill text-warning"></i> Miembros</h5>
            <ul class="list-group list-group-flush">
                <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center"
                    th:each="m : ${confirmedMembers}">
                    <span>
                        <i class="bi bi-person-circle text-warning"></i>
                        <span th:text="${m.user.username}"></span>
                        <span th:if="${m.user.equals(team.captain)}"
                              class="badge bg-warning text-dark ms-1">Capitán</span>
                    </span>
                    <form th:if="${isCaptain and !m.user.equals(team.captain)}"
                          th:action="@{/teams/{id}/kick(id=${team.id})}" method="post">
                        <input type="hidden" name="username" th:value="${m.user.username}"/>
                        <button class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-person-dash"></i> Expulsar
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- Invitaciones pendientes (solo capitán) -->
        <div th:if="${isCaptain and !pendingMembers.empty}" class="mt-3">
            <h6 class="text-warning"><i class="bi bi-hourglass-split"></i> Esperando respuesta</h6>
            <ul class="list-group list-group-flush">
                <li class="list-group-item bg-dark text-muted"
                    th:each="p : ${pendingMembers}">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${p.user.username}"></span>
                    <span class="badge bg-secondary ms-1">Pendiente</span>
                </li>
            </ul>
        </div>

    </div>
</div>

</body>
</html>
