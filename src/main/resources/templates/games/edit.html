<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Editar juego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body class="bg-dark text-white">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4" style="max-width: 700px;">

        <div class="d-flex align-items-center mb-4 gap-3">
            <a href="/games" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
            <h2 class="mb-0"><i class="bi bi-pencil text-warning"></i> Editar juego</h2>
        </div>

        <!-- Alertas -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card bg-secondary border-secondary">
            <div class="card-body">
                <form th:action="@{/games/{id}/edit(id=${game.id})}" method="post" onsubmit="buildParticipants()">

                    <!-- Nombre -->
                    <div class="mb-3">
                        <label class="form-label text-white-50 small">🎮 Nombre del juego</label>
                        <input type="text" name="name" class="form-control bg-dark text-white border-secondary"
                            th:value="${game.name}" required />
                    </div>

                    <!-- Slug -->
                    <div class="mb-3">
                        <label class="form-label text-white-50 small">🔗 Slug RAWG</label>
                        <input type="text" name="slug" class="form-control bg-dark text-white border-secondary"
                            th:value="${game.slug}" />
                        <div class="form-text text-white-50">
                            Identificador de RAWG. Ej: <code>league-of-legends</code>
                        </div>
                    </div>

                    <!-- Jugadores por equipo -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-white-50 small">👥 Jugadores por equipo</label>
                            <input type="number" name="playersPerTeam" min="0" max="20"
                                class="form-control bg-dark text-white border-secondary"
                                th:value="${game.playersPerTeam}" />
                            <div class="form-text text-white-50">Pon 0 si es individual</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white-50 small">🔄 Máx. suplentes por equipo</label>
                            <input type="number" name="maxSubstitutesPerTeam" min="0" max="10"
                                class="form-control bg-dark text-white border-secondary"
                                th:value="${game.maxSubstitutesPerTeam}" />
                        </div>
                    </div>

                    <!-- Modalidades -->
                    <div class="mb-3">
                        <label class="form-label text-white-50 small">🎯 Modalidades permitidas</label>
                        <div class="d-flex gap-3 flex-wrap">
                            <div class="form-check" th:each="mod : ${T(com.mikeldi.demo.entity.Tournament.Modality).values()}">
                                <input class="form-check-input" type="checkbox" name="allowedModalities"
                                    th:value="${mod.name()}" th:id="${'mod_' + mod.name()}"
                                    th:checked="${game.allowedModalities != null and game.allowedModalities.contains(mod)}" />
                                <label class="form-check-label" th:for="${'mod_' + mod.name()}"
                                    th:text="${mod.name()}"></label>
                            </div>
                        </div>
                    </div>

                    <!-- Máx. participantes -->
                    <div class="mb-4">
                        <label class="form-label text-white-50 small">
                            🏆 Máx. participantes permitidos
                            <span class="text-warning ms-1">(separados por comas)</span>
                        </label>
                        <input type="text" id="participantsInput"
                            class="form-control bg-dark text-white border-secondary"
                            th:value="${game.allowedMaxParticipantsStr()}" />
                        <div class="form-text text-white-50">Ej: 8, 16, 32</div>
                        <div id="participantsHidden"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning text-dark fw-bold">
                            <i class="bi bi-floppy"></i> Guardar cambios
                        </button>
                        <a href="/games" class="btn btn-outline-secondary">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function buildParticipants() {
            const raw = document.getElementById('participantsInput').value;
            const values = raw.split(',').map(v => parseInt(v.trim())).filter(v => !isNaN(v));
            const container = document.getElementById('participantsHidden');
            container.innerHTML = values.map(v =>
                `<input type="hidden" name="allowedMaxParticipants" value="${v}"/>`
            ).join('');
        }
    </script>
</body>

</html>
