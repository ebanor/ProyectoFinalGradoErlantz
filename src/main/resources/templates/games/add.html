<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Añadir juego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        .result-card:hover {
            border-color: #ffc107 !important;
            cursor: pointer;
            transform: scale(1.01);
            transition: 0.2s;
        }

        .result-card {
            transition: 0.2s;
        }

        .result-card.selected {
            border-color: #ffc107 !important;
            background-color: #2a2a00 !important;
        }
    </style>
</head>

<body class="bg-dark text-white">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4" style="max-width: 800px;">

        <div class="d-flex align-items-center mb-4 gap-3">
            <a href="/games" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
            <h2 class="mb-0"><i class="bi bi-plus-circle text-warning"></i> Añadir juego</h2>
        </div>

        <!-- Alertas -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- PASO 1: Buscar juego -->
        <div class="card bg-secondary border-secondary mb-4">
            <div class="card-body">
                <h5 class="mb-3"><span class="badge bg-warning text-dark me-2">1</span>Buscar juego en RAWG</h5>
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control bg-dark text-white border-secondary"
                        placeholder="Ej: Valorant, Fortnite, Minecraft..." />
                    <button class="btn btn-warning text-dark fw-bold" onclick="searchGames()">
                        <i class="bi bi-search"></i> Buscar
                    </button>
                </div>
                <div id="searchResults" class="row g-2 mt-2"></div>
            </div>
        </div>

        <!-- PASO 2: Especificaciones (oculto hasta seleccionar juego) -->
        <div id="specsSection" class="card bg-secondary border-secondary" style="display:none;">
            <div class="card-body">
                <h5 class="mb-3"><span class="badge bg-warning text-dark me-2">2</span>Especificaciones para torneos
                </h5>

                <form th:action="@{/games/add}" method="post">
                    <!-- Campos ocultos del juego seleccionado -->
                    <input type="hidden" id="selectedName" name="name" />
                    <input type="hidden" id="selectedSlug" name="slug" />

                    <!-- Juego seleccionado (visual) -->
                    <div class="d-flex align-items-center gap-3 mb-4 p-3 bg-dark rounded">
                        <img id="selectedImg" src="" alt="" width="80" height="45"
                            style="object-fit:cover; border-radius:6px;" />
                        <div>
                            <div class="fw-bold text-warning fs-5" id="selectedNameDisplay"></div>
                            <div class="text-white-50 small" id="selectedSlugDisplay"></div>
                        </div>
                    </div>

                    <div class="row g-3">

                        <!-- Modalidades permitidas
                        <div class="col-12">
                            <label class="form-label text-white-50 small">🎮 Modalidades permitidas</label>

                            <div th:if="${modalities != null}" th:each="mod : ${modalities}" class="form-check">
                                <input class="form-check-input" type="checkbox" name="allowedModalities"
                                    th:value="${mod}" th:id="${'mod_' + mod}" />

                                <label class="form-check-label" th:for="${'mod_' + mod}" th:text="${mod}">
                                </label>
                            </div>
                        </div> -->

                        <!-- Jugadores por equipo -->
                        <div class="col-md-6">
                            <label class="form-label text-white-50 small">👥 Jugadores por equipo</label>
                            <input type="number" name="playersPerTeam" min="0" max="20" value="0"
                                class="form-control bg-dark text-white border-secondary" />
                            <div class="form-text text-white-50">Pon 0 si es individual</div>
                        </div>

                        <!-- Suplentes por equipo -->
                        <div class="col-md-6">
                            <label class="form-label text-white-50 small">🔄 Máx. suplentes por equipo</label>
                            <input type="number" name="maxSubstitutesPerTeam" min="0" max="10" value="0"
                                class="form-control bg-dark text-white border-secondary" />
                        </div>

                        <!-- Máx. participantes permitidos -->
                        <div class="col-12">
                            <label class="form-label text-white-50 small">
                                🏆 Máx. participantes permitidos
                                <span class="text-warning ms-1">(añade los valores separados por comas)</span>
                            </label>
                            <input type="text" id="participantsInput"
                                class="form-control bg-dark text-white border-secondary" placeholder="Ej: 8, 16, 32" />
                            <div class="form-text text-white-50">Cada valor generará una opción al crear torneos</div>
                            <!-- Se generan dinámicamente -->
                            <div id="participantsHidden"></div>
                        </div>

                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning text-dark fw-bold" onclick="buildParticipants()">
                            <i class="bi bi-floppy"></i> Guardar juego
                        </button>
                        <a href="/games" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function searchGames() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;

            const container = document.getElementById('searchResults');
            container.innerHTML = `
        <div class="col-12 text-center py-3">
            <div class="spinner-border text-warning spinner-border-sm"></div>
            <span class="ms-2 text-muted">Buscando...</span>
        </div>`;

            fetch('/api/games/search?q=' + encodeURIComponent(q))
                .then(res => res.json())
                .then(data => {
                    if (!data.results || data.results.length === 0) {
                        container.innerHTML = '<p class="text-muted small mt-2">No se encontraron resultados.</p>';
                        return;
                    }
                    container.innerHTML = data.results.map(g => `
                    <div class="col-md-4">
                        <div class="card bg-dark border-secondary result-card p-2"
                             onclick="selectGame(this, '${g.slug}', '${g.name.replace(/'/g, "\\'")}', '${g.background_image || ''}')">
                            ${g.background_image
                            ? `<img src="${g.background_image}" class="card-img-top rounded mb-2"
                                        style="height:80px; object-fit:cover;"/>`
                            : `<div class="bg-secondary rounded mb-2" style="height:80px;"></div>`}
                            <div class="small fw-bold">${g.name}</div>
                            <div class="text-white-50" style="font-size:0.75rem;">${g.slug}</div>
                        </div>
                    </div>
                `).join('');
                })
                .catch(() => {
                    container.innerHTML = '<p class="text-danger small mt-2">❌ Error al buscar.</p>';
                });
        }

        function selectGame(el, slug, name, img) {
            document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');

            document.getElementById('selectedName').value = name;
            document.getElementById('selectedSlug').value = slug;
            document.getElementById('selectedNameDisplay').innerText = name;
            document.getElementById('selectedSlugDisplay').innerText = slug;
            if (img) document.getElementById('selectedImg').src = img;

            document.getElementById('specsSection').style.display = 'block';
            document.getElementById('specsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function buildParticipants() {
            const raw = document.getElementById('participantsInput').value;
            const values = raw.split(',').map(v => parseInt(v.trim())).filter(v => !isNaN(v));
            const container = document.getElementById('participantsHidden');
            container.innerHTML = values.map(v =>
                `<input type="hidden" name="allowedMaxParticipants" value="${v}"/>`
            ).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); searchGames(); }
            });
        });
    </script>
</body>

</html>
