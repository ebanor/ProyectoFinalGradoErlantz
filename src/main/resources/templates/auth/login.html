<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-white">

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
    <div class="card bg-secondary p-4 shadow" style="width:400px">
        <h2 class="text-center mb-4">
            <i class="bi bi-trophy-fill text-warning"></i> Tournament Platform
        </h2>

        <div th:if="${param.registered}" class="alert alert-success">
            Registro exitoso, ya puedes iniciar sesión.
        </div>
        <div th:if="${param.error}" class="alert alert-danger">
            Usuario o contraseña incorrectos.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>

        <p class="text-center mt-3 mb-0">
            ¿No tienes cuenta? <a href="/register" class="text-warning">Regístrate</a>
        </p>
    </div>
</div>

</body>
</html>
