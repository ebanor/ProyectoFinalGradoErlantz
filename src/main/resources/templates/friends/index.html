<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Amigos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-white">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4" style="max-width:700px;">

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <!-- Añadir amigo -->
    <div class="card bg-secondary p-3 mb-4">
        <h5><i class="bi bi-person-plus-fill text-warning"></i> Añadir amigo</h5>
        <form th:action="@{/friends/add}" method="post" class="d-flex gap-2 mt-2">
            <input type="text" name="username" class="form-control"
                   placeholder="Nombre de usuario" required/>
            <button type="submit" class="btn btn-warning">
                <i class="bi bi-send"></i> Enviar
            </button>
        </form>
    </div>

    <!-- Solicitudes pendientes -->
    <div class="card bg-secondary p-3 mb-4" th:if="${!pending.empty}">
        <h5><i class="bi bi-bell-fill text-warning"></i>
            Solicitudes pendientes
            <span class="badge bg-warning text-dark ms-1" th:text="${pending.size()}"></span>
        </h5>
        <ul class="list-group list-group-flush mt-2">
            <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center"
                th:each="f : ${pending}">
                <span>
                    <i class="bi bi-person-circle text-warning"></i>
                    <span th:text="${f.sender.username}"></span>
                </span>
                <div class="d-flex gap-2">
                    <form th:action="@{/friends/accept/{id}(id=${f.id})}" method="post">
                        <button class="btn btn-success btn-sm">
                            <i class="bi bi-check-lg"></i> Aceptar
                        </button>
                    </form>
                    <form th:action="@{/friends/reject/{id}(id=${f.id})}" method="post">
                        <button class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-x-lg"></i> Rechazar
                        </button>
                    </form>
                </div>
            </li>
        </ul>
    </div>

	<!-- Lista de amigos -->
	<div class="card bg-secondary p-3">
	    <h5><i class="bi bi-people-fill text-warning"></i>
	        Mis amigos
	        <span class="badge bg-secondary ms-1" th:text="${friends.size()}"></span>
	    </h5>
	    <div th:if="${friends.empty}" class="text-muted mt-2">
	        Aún no tienes amigos añadidos.
	    </div>
	    <ul class="list-group list-group-flush mt-2">
	        <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center"
	            th:each="f : ${friends}">
	            <span>
	                <i class="bi bi-person-circle text-warning"></i>
	                <span th:text="${f.username}"></span>
	            </span>
				<form th:action="@{/friends/remove/{id}(id=${f.friendshipId})}" method="post"
				      onsubmit="return confirm('¿Eliminar a ' + this.dataset.username + ' de tus amigos?')"
				      th:data-username="${f.username}">
	                <button class="btn btn-outline-danger btn-sm">
	                    <i class="bi bi-person-x"></i>
	                </button>
	            </form>
	        </li>
	    </ul>
	</div>

</div>
</body>
</html>
