<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
	<link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-dark text-white">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <!-- Cabecera perfil -->
    <div class="card bg-secondary p-4 mb-4">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-person-circle text-warning" style="font-size: 4rem;"></i>
            <div>
                <h2 class="text-warning mb-0" th:text="${user.username}"></h2>
                <span class="badge bg-dark text-warning border border-warning mt-1"
                      th:text="${user.role}"></span>
            </div>
        </div>
    </div>

    <!-- Estadísticas -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-trophy-fill text-warning fs-2"></i>
                <h4 th:text="${torneosTotales}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos jugados</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-award-fill text-warning fs-2"></i>
                <h4 th:text="${torneosGanados}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos ganados</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-people-fill text-warning fs-2"></i>
                <h4 th:text="${totalAmigos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Amigos</p>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <!-- Mis torneos -->
        <div class="col-md-6">
            <div class="card bg-secondary p-3 h-100">
                <h5><i class="bi bi-calendar-event text-warning"></i> Mis torneos</h5>
                <hr class="border-light"/>
                <div th:if="${myRegistrations.empty}" class="text-muted small">
                    No estás inscrito en ningún torneo.
                </div>
                <ul class="list-group list-group-flush" th:if="${!myRegistrations.empty}">
                    <li th:each="r : ${myRegistrations}"
                        class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
                        <span>
                            <i class="bi bi-controller text-warning me-1"></i>
                            <a th:href="@{/tournaments/{id}(id=${r.tournament.id})}"
                               class="text-white text-decoration-none"
                               th:text="${r.tournament.name}"></a>
                        </span>
                        <span class="badge bg-success"           th:if="${r.tournament.status.name() == 'OPEN'}">Abierto</span>
                        <span class="badge bg-warning text-dark" th:if="${r.tournament.status.name() == 'IN_PROGRESS'}">En curso</span>
                        <span class="badge bg-secondary"         th:if="${r.tournament.status.name() == 'FINISHED'}">Finalizado</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Mis equipos -->
        <div class="col-md-6">
            <div class="card bg-secondary p-3 h-100">
                <h5><i class="bi bi-shield-fill text-warning"></i> Mis equipos</h5>
                <hr class="border-light"/>

                <div th:if="${myTeams.empty and memberTeams.empty}" class="text-muted small">
                    No perteneces a ningún equipo.
                    <a href="/teams/new" class="text-warning">Crear equipo</a>
                </div>

                <ul class="list-group list-group-flush">
                    <li th:each="t : ${myTeams}"
                        class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
                        <span>
                            <i class="bi bi-shield-fill text-warning me-1"></i>
                            <a th:href="@{/teams/{id}(id=${t.id})}"
                               class="text-white text-decoration-none"
                               th:text="${t.name}"></a>
                        </span>
                        <span class="badge bg-warning text-dark">Capitán</span>
                    </li>
                    <li th:each="t : ${memberTeams}"
                        class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
                        <span>
                            <i class="bi bi-shield text-warning me-1"></i>
                            <a th:href="@{/teams/{id}(id=${t.id})}"
                               class="text-white text-decoration-none"
                               th:text="${t.name}"></a>
                        </span>
                        <span class="badge bg-secondary">Miembro</span>
                    </li>
                </ul>
            </div>
        </div>

		<!-- Mis amigos -->
		<div class="col-md-12">
		    <div class="card bg-secondary p-3">
		        <h5><i class="bi bi-people-fill text-warning"></i> Mis amigos</h5>
		        <hr class="border-light"/>
		        <div th:if="${friends.empty}" class="text-muted small">
		            No tienes amigos todavía.
		            <a href="/friends" class="text-warning">Añadir amigos</a>
		        </div>
		        <div th:if="${!friends.empty}" class="d-flex flex-wrap gap-2">
		            <div th:each="f : ${friends}"
		                 class="d-flex align-items-center gap-1 badge bg-dark border border-secondary text-white p-2">
		                <i class="bi bi-person-circle text-warning me-1"></i>
		                <span th:text="${f.username}"></span>
						<form th:action="@{/friends/remove/{id}(id=${f.friendshipId})}" method="post" class="ms-1"
						      onsubmit="return confirm('¿Eliminar a ' + this.dataset.username + ' de tus amigos?')"
						      th:data-username="${f.username}">
		                    <button class="btn btn-link text-danger p-0" style="font-size:0.75rem;">
		                        <i class="bi bi-x-lg"></i>
		                    </button>
		                </form>
		            </div>
		        </div>
		    </div>
		</div>

    </div>
</div>

</body>
</html>
