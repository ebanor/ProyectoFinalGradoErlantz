<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Torneo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        textarea { resize: none !important; }
    </style>
</head>
<body class="bg-dark text-white">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4">
    <div class="card bg-secondary p-4" style="max-width:600px; margin:auto">
        <h2 class="mb-4"><i class="bi bi-plus-circle text-warning"></i> Nuevo Torneo</h2>

        <form th:action="@{/tournaments/new}" method="post">

            <div class="mb-3">
                <label class="form-label">Nombre del torneo</label>
                <input type="text" name="name" class="form-control" required/>
            </div>

            <div class="mb-3">
                <label class="form-label">Juego</label>
                <select name="gameId" id="gameSelect" class="form-select" required onchange="onGameChange()">
                    <option value="">-- Selecciona un juego --</option>
                    <option th:each="g : ${games}"
                            th:value="${g.id}"
                            th:text="${g.name}"
                            th:attr="data-modalities=${g.allowedModalitiesStr},
                                     data-max-participants=${g.allowedMaxParticipantsStr},
                                     data-max-substitutes=${g.maxSubstitutesPerTeam},
                                     data-players-per-team=${g.playersPerTeam}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Modalidad</label>
                <select id="modalitySelect" class="form-select" required onchange="onModalityChange()">
                    <option value="">-- Primero selecciona un juego --</option>
                </select>
                <input type="hidden" name="modality" id="modalityHidden"/>
                <input type="hidden" name="playersPerTeam" id="playersPerTeamHidden"/>
            </div>

            <div class="mb-3 p-2 rounded bg-dark" id="teamInfoContainer" style="display:none;">
                <small class="text-warning">
                    <i class="bi bi-people-fill"></i>
                    Jugadores por equipo: <strong id="playersPerTeamLabel">--</strong>
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label" id="maxParticipantsLabel">Máximo de participantes</label>
                <select name="maxParticipants" id="maxParticipantsSelect" class="form-select" required>
                    <option value="">-- Primero selecciona un juego --</option>
                </select>
            </div>

            <div class="mb-3" id="substitutesContainer" style="display:none;">
                <label class="form-label">
                    Suplentes por equipo
                    <span class="text-warning" id="maxSubsHint"></span>
                </label>
                <input type="number" name="substitutesPerTeam" id="substitutesInput"
                       class="form-control" min="0" value="0"/>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de inicio</label>
                <input type="datetime-local" name="startDate" class="form-control"/>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-check-circle"></i> Crear Torneo
                </button>
                <a href="/tournaments" class="btn btn-outline-light">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
const modalityLabels = {
    'INDIVIDUAL': 'Individual',
    'DUO': 'Duos',
    'TEAM': 'Por equipos'
};

function getSelectedGameData() {
    const sel = document.getElementById('gameSelect');
    const opt = sel.options[sel.selectedIndex];
    return {
        modalities:      opt.getAttribute('data-modalities') || '',
        maxParticipants: opt.getAttribute('data-max-participants') || '',
        maxSubs:         parseInt(opt.getAttribute('data-max-substitutes') || '0'),
        playersPerTeam:  parseInt(opt.getAttribute('data-players-per-team') || '0')
    };
}

function onGameChange() {
    const data = getSelectedGameData();
    updateModalities(data.modalities);
}

function onModalityChange() {
    const data     = getSelectedGameData();
    const modality = document.getElementById('modalitySelect').value;
    document.getElementById('modalityHidden').value = modality;
    updateMaxParticipants(modality, data.maxParticipants);
    updateTeamExtras(modality, data.playersPerTeam, data.maxSubs);
}

function updateModalities(modalities) {
    const sel = document.getElementById('modalitySelect');
    sel.innerHTML = '';
    if (!modalities) {
        sel.innerHTML = '<option value="">-- Primero selecciona un juego --</option>';
        sel.disabled = false;
        document.getElementById('modalityHidden').value = '';
        return;
    }
    const list = modalities.split(',').filter(m => m.trim() !== '');
    if (list.length === 1) {
        const opt = document.createElement('option');
        opt.value = list[0].trim();
        opt.textContent = modalityLabels[list[0].trim()] || list[0].trim();
        opt.selected = true;
        sel.appendChild(opt);
        sel.disabled = true;
    } else {
        sel.disabled = false;
        list.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.trim();
            opt.textContent = modalityLabels[m.trim()] || m.trim();
            sel.appendChild(opt);
        });
    }
    const selectedModality = sel.value;
    document.getElementById('modalityHidden').value = selectedModality;
    const data = getSelectedGameData();
    updateMaxParticipants(selectedModality, data.maxParticipants);
    updateTeamExtras(selectedModality, data.playersPerTeam, data.maxSubs);
}

function updateMaxParticipants(modality, maxParticipantsStr) {
    const sel   = document.getElementById('maxParticipantsSelect');
    const label = document.getElementById('maxParticipantsLabel');
    sel.innerHTML = '';

    label.textContent = modality === 'TEAM' ? 'Máximo de equipos' : 'Máximo de participantes';

    if (!maxParticipantsStr) {
        sel.innerHTML = '<option value="">-- Primero selecciona un juego --</option>';
        return;
    }

    const suffix = modality === 'TEAM' ? ' equipos' : ' participantes';
    maxParticipantsStr.split(',').filter(v => v.trim() !== '').forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.trim();
        opt.textContent = v.trim() + suffix;
        sel.appendChild(opt);
    });
}

function updateTeamExtras(modality, playersPerTeam, maxSubs) {
    const teamInfo  = document.getElementById('teamInfoContainer');
    const subsDiv   = document.getElementById('substitutesContainer');
    const subsInput = document.getElementById('substitutesInput');
    const subsHint  = document.getElementById('maxSubsHint');
    const ppLabel   = document.getElementById('playersPerTeamLabel');

    document.getElementById('playersPerTeamHidden').value = playersPerTeam > 0 ? playersPerTeam : 0;

    if (modality === 'TEAM') {
        teamInfo.style.display = playersPerTeam > 0 ? 'block' : 'none';
        ppLabel.textContent = playersPerTeam > 0 ? playersPerTeam : '--';

        if (maxSubs > 0) {
            subsDiv.style.display = 'block';
            subsInput.max = maxSubs;
            subsInput.value = 0;
            subsHint.textContent = '(máx. ' + maxSubs + ')';
        } else {
            subsDiv.style.display = 'none';
            subsInput.value = 0;
        }
    } else {
        teamInfo.style.display = 'none';
        subsDiv.style.display  = 'none';
        subsInput.value = 0;
    }
}
</script>

</body>
</html>
