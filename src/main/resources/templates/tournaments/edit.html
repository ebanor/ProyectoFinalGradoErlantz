<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Editar Torneo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
	<link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>textarea { resize: none !important; }</style>
</head>
<body class="bg-dark text-white">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4">
    <div class="card bg-secondary p-4" style="max-width:600px; margin:auto">
        <h2 class="mb-4"><i class="bi bi-pencil-square text-warning"></i> Editar Torneo</h2>

        <form th:action="@{/tournaments/{id}/edit(id=${tournament.id})}" method="post">

            <div class="mb-3">
                <label class="form-label">Nombre del torneo</label>
                <input type="text" name="name" class="form-control"
                       th:value="${tournament.name}" required/>
            </div>

            <div class="mb-3">
                <label class="form-label">Juego</label>
                <input type="text" class="form-control"
                       th:value="${tournament.game.name}" disabled/>
                <small class="text-light">El juego no se puede cambiar una vez creado.</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Modalidad</label>
                <input type="text" class="form-control"
                       th:value="${tournament.modality == T(com.mikeldi.demo.entity.Tournament.Modality).INDIVIDUAL ? 'Individual' :
                                   tournament.modality == T(com.mikeldi.demo.entity.Tournament.Modality).DUO ? 'Duos' : 'Por equipos'}"
                       disabled/>
                <small class="text-light">La modalidad no se puede cambiar una vez creado.</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="status" class="form-select" required>
                    <option value="OPEN"        th:selected="${tournament.status.name() == 'OPEN'}">Abierto</option>
                    <option value="CLOSED"      th:selected="${tournament.status.name() == 'CLOSED'}">Cerrado</option>
                    <option value="IN_PROGRESS" th:selected="${tournament.status.name() == 'IN_PROGRESS'}">En curso</option>
                    <option value="FINISHED"    th:selected="${tournament.status.name() == 'FINISHED'}">Finalizado</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="description" class="form-control" rows="3"
                          th:text="${tournament.description}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de inicio</label>
                <input type="datetime-local" name="startDate" class="form-control"
                       th:value="${startDateFormatted}"/>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-check-circle"></i> Guardar cambios
                </button>
                <a th:href="@{/tournaments/{id}(id=${tournament.id})}"
                   class="btn btn-outline-light">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
