<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
	<link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-dark text-white">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="text-warning mb-4"><i class="bi bi-gear-fill"></i> Panel de Administración</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <!-- Estadísticas globales -->
    <div class="row g-3 mb-5">
        <div class="col-md-3">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-people-fill text-warning fs-2"></i>
                <h4 th:text="${totalUsuarios}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Usuarios registrados</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-trophy-fill text-warning fs-2"></i>
                <h4 th:text="${totalTorneos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos totales</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-play-circle-fill text-warning fs-2"></i>
                <h4 th:text="${torneosActivos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos en curso</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-door-open-fill text-warning fs-2"></i>
                <h4 th:text="${torneosAbiertos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos abiertos</p>
            </div>
        </div>
    </div>

    <!-- Gestión de usuarios -->
    <div class="card bg-secondary p-4 mb-5">
        <h5><i class="bi bi-people-fill text-warning"></i> Gestión de usuarios</h5>
        <hr class="border-light"/>

        <!-- Buscador -->
        <div class="mb-3">
            <input type="text" id="userSearch"
                   class="form-control bg-dark text-white border-secondary"
                   placeholder="🔍 Buscar por usuario, email o rol..."/>
        </div>

        <div style="max-height: 400px; overflow-y: auto;">
            <table class="table table-dark table-hover align-middle">
                <thead class="text-warning sticky-top" style="top: 0; z-index: 1;">
                    <tr>
                        <th>#</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Cambiar rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}"></td>
                        <td><i class="bi bi-person-circle text-warning me-1"></i><span th:text="${u.username}"></span></td>
                        <td th:text="${u.email}"></td>
                        <td>
                            <span class="badge bg-warning text-dark" th:if="${u.role.name() == 'ADMIN'}">ADMIN</span>
                            <span class="badge bg-info text-dark"    th:if="${u.role.name() == 'ORGANIZER'}">ORGANIZER</span>
                            <span class="badge bg-secondary"         th:if="${u.role.name() == 'PLAYER'}">PLAYER</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post"
                                  class="d-flex gap-2">
                                <select name="role" class="form-select form-select-sm" style="width:130px;">
                                    <option value="PLAYER"    th:selected="${u.role.name() == 'PLAYER'}">PLAYER</option>
                                    <option value="ORGANIZER" th:selected="${u.role.name() == 'ORGANIZER'}">ORGANIZER</option>
                                    <option value="ADMIN"     th:selected="${u.role.name() == 'ADMIN'}">ADMIN</option>
                                </select>
                                <button class="btn btn-warning btn-sm">OK</button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                                  onsubmit="return confirm('¿Eliminar usuario?')">
                                <button class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('userSearch').addEventListener('input', function () {
        const filter = this.value.toLowerCase();
        document.querySelectorAll('#userTableBody tr').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(filter) ? '' : 'none';
        });
    });
</script>
</body>
</html>
