<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-white">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="text-warning mb-4"><i class="bi bi-gear-fill"></i> Panel de Administración</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <!-- Estadísticas globales -->
    <div class="row g-3 mb-5">
        <div class="col-md-3">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-people-fill text-warning fs-2"></i>
                <h4 th:text="${totalUsuarios}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Usuarios registrados</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-trophy-fill text-warning fs-2"></i>
                <h4 th:text="${totalTorneos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos totales</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-play-circle-fill text-warning fs-2"></i>
                <h4 th:text="${torneosActivos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos en curso</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-door-open-fill text-warning fs-2"></i>
                <h4 th:text="${torneosAbiertos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos abiertos</p>
            </div>
        </div>
    </div>

    <!-- Gestión de usuarios -->
    <div class="card bg-secondary p-4 mb-5">
        <h5><i class="bi bi-people-fill text-warning"></i> Gestión de usuarios</h5>
        <hr class="border-light"/>
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead class="text-warning">
                    <tr>
                        <th>#</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Cambiar rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}"></td>
                        <td><i class="bi bi-person-circle text-warning me-1"></i><span th:text="${u.username}"></span></td>
                        <td th:text="${u.email}"></td>
                        <td>
                            <span class="badge bg-warning text-dark" th:if="${u.role.name() == 'ADMIN'}">ADMIN</span>
                            <span class="badge bg-info text-dark"    th:if="${u.role.name() == 'ORGANIZER'}">ORGANIZER</span>
                            <span class="badge bg-secondary"         th:if="${u.role.name() == 'PLAYER'}">PLAYER</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post"
                                  class="d-flex gap-2">
                                <select name="role" class="form-select form-select-sm" style="width:130px;">
                                    <option value="PLAYER"    th:selected="${u.role.name() == 'PLAYER'}">PLAYER</option>
                                    <option value="ORGANIZER" th:selected="${u.role.name() == 'ORGANIZER'}">ORGANIZER</option>
                                    <option value="ADMIN"     th:selected="${u.role.name() == 'ADMIN'}">ADMIN</option>
                                </select>
                                <button class="btn btn-warning btn-sm">OK</button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                                  onsubmit="return confirm('¿Eliminar usuario?')">
                                <button class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Gestión de juegos -->
    <div class="card bg-secondary p-4 mb-5">
        <h5><i class="bi bi-controller text-warning"></i> Gestión de juegos</h5>
        <hr class="border-light"/>

        <!-- Añadir juego -->
        <form th:action="@{/admin/games/new}" method="post" class="row g-2 mb-4">
            <div class="col-md-4">
                <input type="text" name="name" class="form-control form-control-sm bg-dark text-white border-secondary"
                       placeholder="Nombre del juego" required/>
            </div>
            <div class="col-md-2">
                <input type="number" name="playersPerTeam" class="form-control form-control-sm bg-dark text-white border-secondary"
                       placeholder="Jugadores/equipo" min="0" value="0" required/>
            </div>
            <div class="col-md-2">
                <input type="number" name="maxSubstitutesPerTeam" class="form-control form-control-sm bg-dark text-white border-secondary"
                       placeholder="Suplentes máx." min="0" value="0" required/>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success btn-sm w-100">
                    <i class="bi bi-plus-circle"></i> Añadir juego
                </button>
            </div>
        </form>

        <table class="table table-dark table-hover align-middle">
            <thead class="text-warning">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Jugadores/equipo</th>
                    <th>Suplentes máx.</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="g : ${games}">
                    <td th:text="${g.id}"></td>
                    <td><i class="bi bi-controller text-warning me-1"></i><span th:text="${g.name}"></span></td>
                    <td th:text="${g.playersPerTeam}"></td>
                    <td th:text="${g.maxSubstitutesPerTeam}"></td>
                    <td>
                        <form th:action="@{/admin/games/{id}/delete(id=${g.id})}" method="post"
                              onsubmit="return confirm('¿Eliminar juego?')">
                            <button class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
