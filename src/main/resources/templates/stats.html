<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-white">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="text-warning mb-4"><i class="bi bi-bar-chart-fill"></i> Estadísticas</h2>

    <!-- Estadísticas personales -->
    <h5 class="text-light mb-3">
        <i class="bi bi-person-circle text-warning"></i>
        Mis estadísticas —
        <span class="text-warning" th:text="${user.username}"></span>
    </h5>

    <div class="row g-3 mb-5">
        <div class="col-md-3 col-6">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-trophy-fill text-warning fs-2"></i>
                <h4 th:text="${torneosTotales}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos jugados</p>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-award-fill text-warning fs-2"></i>
                <h4 th:text="${torneosGanados}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Torneos ganados</p>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-controller text-warning fs-2"></i>
                <h4 th:text="${partidosJugados}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Partidos jugados</p>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-lightning-fill text-warning fs-2"></i>
                <h4 th:text="${partidosGanados}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Partidos ganados</p>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-shield-fill text-warning fs-2"></i>
                <h4 th:text="${victoriasEquipo}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Victorias en equipo</p>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-people-fill text-warning fs-2"></i>
                <h4 th:text="${totalAmigos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Amigos</p>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-diagram-3-fill text-warning fs-2"></i>
                <h4 th:text="${totalEquipos}" class="mt-2 text-warning"></h4>
                <p class="text-muted small mb-0">Equipos</p>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card bg-dark border-warning text-center p-3">
                <i class="bi bi-percent text-warning fs-2"></i>
                <h4 class="mt-2 text-warning">
                    <span th:if="${partidosJugados > 0}"
                          th:text="${#numbers.formatDecimal(partidosGanados * 100.0 / partidosJugados, 1, 1) + '%'}">
                    </span>
                    <span th:if="${partidosJugados == 0}">—</span>
                </h4>
                <p class="text-muted small mb-0">% victorias</p>
            </div>
        </div>
    </div>

    <!-- Top 10 global -->
    <h5 class="text-light mb-3">
        <i class="bi bi-trophy text-warning"></i> Top 10 — Jugadores con más victorias
    </h5>

    <div class="card bg-secondary p-4 mb-5">
        <div th:if="${top10.empty}" class="text-muted">
            Aún no hay partidos finalizados.
        </div>
        <table th:if="${!top10.empty}" class="table table-dark table-hover align-middle mb-0">
            <thead class="text-warning">
                <tr>
                    <th>#</th>
                    <th>Jugador</th>
                    <th>Victorias</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row, i : ${top10}"
                    th:classappend="${row[0].username == user.username} ? 'table-warning text-dark' : ''">
                    <td>
                        <span th:if="${i.index == 0}"><i class="bi bi-trophy-fill text-warning"></i></span>
                        <span th:if="${i.index == 1}"><i class="bi bi-trophy-fill text-secondary"></i></span>
                        <span th:if="${i.index == 2}"><i class="bi bi-trophy-fill" style="color:#cd7f32"></i></span>
                        <span th:if="${i.index > 2}" th:text="${i.index + 1}"></span>
                    </td>
                    <td>
                        <i class="bi bi-person-circle text-warning me-1"></i>
                        <span th:text="${row[0].username}"></span>
                        <span th:if="${row[0].username == user.username}"
                              class="badge bg-warning text-dark ms-1">Tú</span>
                    </td>
                    <td>
                        <span class="badge bg-warning text-dark" th:text="${row[1]}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
